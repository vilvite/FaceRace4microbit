<script>

// ██╗  ██╗     ██╗██╗   ██╗██╗

const wheel = document.getElementById("wheel");
const container = document.getElementById("container");

// --- STATE ---
let angle = 0;          // steering (-90 to 90)
let speed = 0;          // throttle (-100 to 100)

const maxAngle = 90;
const maxSpeed = 100;

const clamp = (v, min, max) => Math.max(min, Math.min(max, v));

// --- DRAG ---
let dragging = false;
let lastX = 0;
let lastY = 0;

wheel.addEventListener("mousedown", e => {
  dragging = true;
  lastX = e.clientX;
  lastY = e.clientY;
});
window.addEventListener("mouseup", () => dragging = false);

window.addEventListener("mousemove", e => {
  if (!dragging) return;

  let dx = e.clientX - lastX;
  let dy = e.clientY - lastY;

  angle = clamp(angle + dx * 0.5, -maxAngle, maxAngle);
  speed = clamp(speed - dy * 0.5, -maxSpeed, maxSpeed);

  lastX = e.clientX;
  lastY = e.clientY;
});

// Touch
wheel.addEventListener("touchstart", e => {
  dragging = true;
  lastX = e.touches[0].clientX;
  lastY = e.touches[0].clientY;
});
window.addEventListener("touchend", () => dragging = false);

window.addEventListener("touchmove", e => {
  if (!dragging) return;

  let dx = e.touches[0].clientX - lastX;
  let dy = e.touches[0].clientY - lastY;

  angle = clamp(angle + dx * 0.5, -maxAngle, maxAngle);
  speed = clamp(speed - dy * 0.5, -maxSpeed, maxSpeed);

  lastX = e.touches[0].clientX;
  lastY = e.touches[0].clientY;
});

// --- KEY INPUT ---
let keys = { left:false, right:false, up:false, down:false };

window.addEventListener("keydown", e => {
  const k = e.key.toLowerCase();
  if (k === "arrowleft" || k === "a") keys.left = true;
  if (k === "arrowright" || k === "d") keys.right = true;
  if (k === "arrowup" || k === "w") keys.up = true;
  if (k === "arrowdown" || k === "s") keys.down = true;
});

window.addEventListener("keyup", e => {
  const k = e.key.toLowerCase();
  if (k === "arrowleft" || k === "a") keys.left = false;
  if (k === "arrowright" || k === "d") keys.right = false;
  if (k === "arrowup" || k === "w") keys.up = false;
  if (k === "arrowdown" || k === "s") keys.down = false;
});


let lastAngle = null;
let lastSpeed = null;

function sendWheelToMicrobit(angle, speed) {
    const msg = `@,${angle},${speed}\n`;

    if (connectedUSB) sendDataToMicrobitUSB(msg);
    if (connectedBT) sendDataToMicrobitBT(msg);
}

function logWheelValues() {

    const angleInt = Math.round(angle);
    const speedInt = Math.round(speed);

    if (
        angleInt === lastAngle &&
        speedInt === lastSpeed
    ) return;

    lastAngle = angleInt;
    lastSpeed = speedInt;

    console.log(`ANGLE: ${angleInt}, SPEED: ${speedInt}`);

    sendWheelToMicrobit(angleInt, speedInt);
}

// 5 updates/sec
setInterval(logWheelValues, 200);


//  ██████╗ ██████╗ ███╗   ██╗███████╗ ██████╗ ██╗     ███████╗
// ██╔════╝██╔═══██╗████╗  ██║██╔════╝██╔═══██╗██║     ██╔════╝
// ██║     ██║   ██║██╔██╗ ██║███████╗██║   ██║██║     █████╗  
// ██║     ██║   ██║██║╚██╗██║╚════██║██║   ██║██║     ██╔══╝  
// ╚██████╗╚██████╔╝██║ ╚████║███████║╚██████╔╝███████╗███████╗
//  ╚═════╝ ╚═════╝ ╚═╝  ╚═══╝╚══════╝ ╚═════╝ ╚══════╝╚══════╝

// Console log stuff here. Tungvint å måtte trykke på F12 for å se etter feil, spesielt siden Fn-lock gjør det til russisk rulett om man skrur PCen i dvale eller ikke.
const outputElement = document.getElementById("output");

        // 1. Unified function to handle different log levels
        function addToOutput(message, type = 'log') {
            const entry = document.createElement('div');
            entry.className = `log-msg log-${type}`;
            
            // Format: [TIMESTAMP] [TYPE] Message
            const timestamp = new Date().toLocaleTimeString();
            entry.textContent = `[${timestamp}] [${type.toUpperCase()}] ${message}`;
            
            outputElement.appendChild(entry);
            outputElement.scrollTop = outputElement.scrollHeight;
        }

        // 2. Capture standard logs
        const originalLog = console.log;
        console.log = function(...args) {
            addToOutput(args.join(' '), 'log');
            originalLog.apply(console, args);
        };

        // 3. Capture error logs
        const originalError = console.error;
        console.error = function(...args) {
            addToOutput(args.join(' '), 'error');
            originalError.apply(console, args);
        };

        // 4. Global Listener for actual runtime crashes (e.g. syntax/reference errors)
        window.onerror = function(msg, url, line) {
            console.error(`${msg} (Line: ${line})`);
            return false;
        };


        // Example usage (this output will now appear in the <div>)
        console.log("Velkommen til den fantastiske Bit:Baot-fjernkontrollen!")
        console.log("Last ned eksempelkoden fra https://makecode.microbit.org/#pub:78584-81810-50396-23545 ")
        console.log("på en micro:bit V2, sett den i en Kitronik BitBot og koble til med Bluetooth")
        console.log("Styr med WASD, piltaster, eller trykk på rattet.")

     //   console.log("USB-koden må lastes ned på 2 micro:bits, 1 som kan stå i BitBot og 1 som kobles til med USB.")
     //   console.log("Alternativt trenger Bluetooth-koden bare 1 micro:bit som står i BitBot, men den må være V2.")
//        console.log(`Live console log start: ${new Date().toLocaleTimeString()}`);








// ▐▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▀▌

// ▐▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▄▌




//BT stuff here
let connectedUSB = false; 
let connectedBT = false; 
let microbitDevice;
let microbitServer;
let microbitService;
let microbitCharacteristic;

const btSendQueue = [];
let btSendingInProgress = false;


// Convert non-ASCII characters - skandinaviske tegn funker ikke på serieport
function convertToASCIICompatible(str) {
    const replacements = {
        'Æ': 'AE', 'Ø': 'OE', 'Å': 'AA',
        'æ': 'ae', 'ø': 'oe', 'å': 'aa',
    };
    return str.split('').map(char => replacements[char] || char).join('');
}




// Connect to Micro:bit over serial. Vanlig USB-tilkobling, ezpz.
document.getElementById("connectButton").addEventListener("click", async () => {
    try {
        
        const microbit = await navigator.serial.requestPort();
        await microbit.open({ baudRate: 115200 });
        writer = microbit.writable.getWriter();
        connectedUSB = true;
        console.log("✅ Connected to micro:bit on USB!");
        document.getElementById('connectButtonBT').disabled = true;
        connectButton.classList.remove("flash-red");    
        
    } catch (error) {
        console.error("❌ Error connecting to micro:bit:", error);
        
    }
});


function handleUSBDisconnect() {
    connectedUSB = false;
    writer = null;
    console.log("⚠️ micro:bit USB disconnected");
    document.getElementById('connectButtonBT').disabled = false;
    if (!connectButton) return;
    connectButton.classList.add("flash-red");
}



document.getElementById("connectButtonBT").addEventListener("click", async () => {
    
    if (microbitDevice?.gatt?.connected) {  //koble fra gamle koblinger for å hindre at listen tømmes
        microbitDevice.gatt.disconnect();
    } 

        resetBluetoothSendState();  
    try {
        console.log("Requesting micro:bit Bluetooth device...");
        microbitDevice = await navigator.bluetooth.requestDevice({
           // acceptAllDevices: true // Allow any Bluetooth device, no filters
            filters: [{ namePrefix: "BBC micro:bit" }], // Only show micro:bit devices
            optionalServices: ['6e400001-b5a3-f393-e0a9-e50e24dcca9e'] // Nordic UART Service (NUS)
        });
        
        
        microbitDevice.addEventListener("gattserverdisconnected", () => {
            console.warn("🔌 Bluetooth disconnected");
            console.error("🔌 Connection lost");
            connectedBT = false;
            microbitCharacteristic = null;
            handleBluetoothDisconnected();
            resetBluetoothSendState();
        });


        console.log("Connecting to GATT Server...");
        microbitServer = await microbitDevice.gatt.connect();
        console.log("Awaiting Primary Service");
        microbitService = await microbitServer.getPrimaryService('6e400001-b5a3-f393-e0a9-e50e24dcca9e');
        console.log("Finding TX Characteristic...");
        microbitCharacteristic = await microbitService.getCharacteristic('6e400003-b5a3-f393-e0a9-e50e24dcca9e'); // TX characteristic, chatGPT mente først at RX var rett
        console.log("Connected to", microbitDevice.name, " via Bluetooth");
        connectedBT = true;
        connectButtonBT.classList.remove("flash-red");
        
    } catch (log) {
        console.log("Bluetooth connection failed, ", log);
        
        
    }
});


// legger til funksjon for å stenge tilkoblinger, dette var siste puslebrikke for å få BT til å bli stabil <3
window.addEventListener("beforeunload", () => {
    if (microbitDevice?.gatt?.connected) {
        microbitDevice.gatt.disconnect();
    }
});


function handleBluetoothDisconnected() { // Trekker brukerens oppmerksomhet diskrét mot tilkoblingsknappen om micro:biten mister kontakt.
    if (!connectButtonBT) return;
    connectButtonBT.classList.add("flash-red");
}



// Send data over serial
async function sendDataToMicrobitUSB(signal) {
    if (!writer) {
        console.error("❌ No writer available to send data.");
        return;
    }
    try {
        const signalToSend = convertToASCIICompatible(signal);
        console.log("📡 Sending:", signalToSend);
        for (let i = 0; i < signalToSend.length; i++) {
            const byte = new TextEncoder().encode(signalToSend[i]);
            await writer.write(byte);
        }
        
    } catch (error) {
        console.error("❌ Error sending data:", error);
        handleUSBDisconnect();
    }
}

// Ny funksjon, sender signalene i kø så man kan prøve på nytt om noe går poff
async function sendDataToMicrobitBT(signal) {
    if (!microbitCharacteristic) {
        console.error("❌ No BT connection thingy available to send data");
        return;
    }

    const signalToSend = convertToASCIICompatible(signal) + "\n";
    btSendQueue.push(signalToSend);

    if (!btSendingInProgress) {
        processBTSendQueue();
    }
}

function delay(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
}

// Ny funksjon for å sende signalene i kø og orden

async function processBTSendQueue() {
    if (btSendQueue.length === 0) {
        btSendingInProgress = false;
        
        return;
    }

    btSendingInProgress = true;
    const message = btSendQueue[0]; // don’t remove yet

    try {
        console.log("📡 Sending:", message.trim());
        const data = new TextEncoder().encode(message);
        await microbitCharacteristic.writeValue(data);

        // success → remove message
        btSendQueue.shift();

        // small pause improves micro:bit stability
        await delay(20);

    } catch (error) {
        if (
            error.name === "NetworkError" &&
            error.message.includes("GATT operation already in progress")
        ) {
            // BLE stack busy → retry same message shortly
            await delay(40);
        } else if (
            error.name === "NetworkError" &&
            error.message.includes("GATT Server is disconnected")
        ) {
            handleBluetoothDisconnected();
            return;
        } else {
            console.error("❌ Error sending data:", error);
            // drop the message to avoid deadlock
            btSendQueue.shift();
        }
    }

    processBTSendQueue();
}

// trengte også en funksjon for å tømme køen når man mister tilkobling

function resetBluetoothSendState() {
    btSendQueue.length = 0;          // clear queue
    btSendingInProgress = false;     // release lock
}






// ██╗      ██████╗  ██████╗ ██████╗ 
// ██║     ██╔═══██╗██╔═══██╗██╔══██╗
// ██║     ██║   ██║██║   ██║██████╔╝
// ██║     ██║   ██║██║   ██║██╔═══╝ 
// ███████╗╚██████╔╝╚██████╔╝██║     
// ╚══════╝ ╚═════╝  ╚═════╝ ╚═╝     

function loop() {

  const rotSpeed = 2.5;
  const moveSpeed = 3;

  if (keys.left)  angle -= rotSpeed;
  if (keys.right) angle += rotSpeed;

  if (keys.up)    speed += moveSpeed;
  if (keys.down)  speed -= moveSpeed;

  if (!dragging && !keys.left && !keys.right) {
    angle *= 0.9;
    if (Math.abs(angle) < 0.1) angle = 0;
  }

  if (!dragging && !keys.up && !keys.down) {
    speed *= 0.9;
    if (Math.abs(speed) < 0.1) speed = 0;
  }

  angle = clamp(angle, -maxAngle, maxAngle);
  speed = clamp(speed, -maxSpeed, maxSpeed);

  const h = container.clientHeight / 2 - 50;
  const y = -(speed / maxSpeed) * h;

  wheel.style.transform =
    `translateY(${y}px) rotate(${angle}deg)`;

  requestAnimationFrame(loop);
}

loop();

loop();

loop();
</script>
